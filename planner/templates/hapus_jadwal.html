<!-- Modal Konfirmasi Hapus -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-body text-center p-4">
                <i class="fas fa-exclamation-circle text-danger mb-3" style="font-size: 50px;"></i>
                <h5 class="fw-bold">Hapus Jadwal?</h5>
                <p class="text-muted small">Hapus jadwal <b id="delJadwalName"></b>?</p>
                <div class="d-flex gap-2 mt-4">
                    <button type="button" class="btn btn-light w-100" style="border-radius: 12px;" data-bs-dismiss="modal">Batal</button>
                    <form id="deleteForm" method="POST" class="w-100">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger w-100" style="border-radius: 12px;">Hapus</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
