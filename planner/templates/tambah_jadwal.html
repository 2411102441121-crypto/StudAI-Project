{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Jadwal - StudAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F0F8FF; padding: 20px; }
        .card-form { border-radius: 25px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; background: white; }
        .btn-save { background-color: #1A1A8B; border: none; border-radius: 12px; padding: 12px; width: 100%; color: white; font-weight: bold; }
        .nav-back { text-decoration: none; color: #1A1A8B; font-weight: bold; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="{% url 'home' %}" class="nav-back">← Kembali</a>

    <div class="card-form">
        <h4 class="mb-4">Tambah Rencana Baru</h4>
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Tipe Rencana</label>
                <select name="tipe" class="form-select" id="tipeSelect" onchange="toggleForm()">
                    <option value="tugas">Tugas</option>
                    <option value="belajar">Kegiatan Belajar</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelNama">Nama Tugas</label>
                <input type="text" name="kegiatan" id="inputKegiatan" class="form-control" placeholder="Contoh: Tugas RPL-Tugas 7" required>
            </div>

            <div class="mb-3" id="wrapperDeadline">
                <label class="form-label">Jam Deadline</label>
                <input type="time" name="jam_deadline" class="form-control">
            </div>

            <div id="wrapperBelajar" style="display: none;">
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Waktu Mulai</label>
                        <input type="time" name="waktu_mulai" class="form-control">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Waktu Selesai</label>
                        <input type="time" name="waktu_selesai" class="form-control">
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label" id="labelTanggal">Tanggal Deadline</label>
                <input type="date" name="tanggal" class="form-control" required>
            </div>

            <button type="submit" class="btn-save shadow">Simpan ke Jadwal</button>
        </form>
    </div>

<script>
    function toggleForm() {
        const tipe = document.getElementById('tipeSelect').value;
        const wrapperDeadline = document.getElementById('wrapperDeadline');
        const wrapperBelajar = document.getElementById('wrapperBelajar');
        const labelNama = document.getElementById('labelNama');
        const labelTanggal = document.getElementById('labelTanggal');
        const inputKegiatan = document.getElementById('inputKegiatan');

        if (tipe === 'tugas') {
            wrapperDeadline.style.display = 'block';
            wrapperBelajar.style.display = 'none';
            
            labelNama.innerText = 'Nama Tugas';
            labelTanggal.innerText = 'Tanggal Deadline';
            inputKegiatan.placeholder = 'Contoh: Laporan Jaringan Komputer';
        } else {
            wrapperDeadline.style.display = 'none';
            wrapperBelajar.style.display = 'block';
            
            labelNama.innerText = 'Nama Kegiatan Belajar';
            labelTanggal.innerText = 'Tanggal Belajar';
            inputKegiatan.placeholder = 'Contoh: Belajar Pemrograman Web Lanjut';
        }
    }

    window.onload = toggleForm;
</script>
</body>
</html>
