{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Judul halaman browser -->
    <title>Register - StudAI</title>

    <!-- Menggunakan font Poppins dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reset margin dan padding bawaan browser */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* Mengatur tampilan halaman utama */
        body{
            font-family:'Poppins',sans-serif;
            background:#F5F5F5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        /* Kotak form register */
        .register-container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        /* Logo aplikasi */
        .logo{
            width:100px;
            margin-bottom:15px;
        }

        /* Nama aplikasi */
        .app-name{
            font-size:42px;
            font-weight:700;
            color:#111A63;
            margin-bottom:10px;
        }

        /* Slogan aplikasi */
        .slogan{
            font-size:14px;
            color:#555;
            margin-bottom:30px;
        }

        /* Jarak antar input */
        .form-group{
            margin-bottom:15px;
        }

        /* Tampilan input username dan password */
        .form-group input{
            width:100%;
            padding:15px 20px;
            border:none;
            border-radius:30px;
            background:#E5E5E5;
            font-size:15px;
            outline:none;
        }

        /* Tombol register */
        .btn-register{
            width:100%;
            padding:15px;
            border:none;
            border-radius:30px;
            background:#111A63;
            color:white;
            font-size:20px;
            font-weight:600;
            cursor:pointer;
            margin-top:10px;
        }

        /* Efek saat mouse diarahkan ke tombol */
        .btn-register:hover{
            opacity:0.9;
        }

        /* Tulisan menuju halaman login */
        .login-text{
            margin-top:25px;
            font-size:14px;
            color:#777;
        }

        .login-text a{
            color:black;
            font-weight:700;
            text-decoration:none;
        }

        /* Informasi aturan password */
        .password-hint{
            display:block;
            margin-top:8px;
            text-align:left;
            padding-left:10px;
            color:#666;
            font-size:12px;
        }
    </style>
</head>

<body>

    <div class="register-container">

        <!-- Menampilkan logo dari folder static -->
        <img src="{% static 'planner/rocket_logo.png' %}" class="logo">

        <!-- Nama aplikasi -->
        <h1 class="app-name">StudAI</h1>

        <!-- Slogan aplikasi -->
        <p class="slogan">
            Join our AI-Powered Learning Community
        </p>

        <!-- Form pendaftaran akun -->
        <form method="POST">

            <!-- Token keamanan CSRF -->
            {% csrf_token %}

            <!-- Input username -->
            <div class="form-group">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <!-- Input password -->
            <div class="form-group">
                <input type="password"
                       name="password1"
                       placeholder="Password"
                       required>
            </div>

            <!-- Input konfirmasi password -->
            <div class="form-group">
                <input type="password"
                       name="password2"
                       placeholder="Confirm Password"
                       required>
            </div>

            <!-- Informasi aturan password -->
            <small class="password-hint">
                🔒 Password minimal 8 karakter
            </small>

            <!-- Tombol submit form -->
            <button type="submit" class="btn-register">
                Register
            </button>

        </form>

        <!-- Link menuju halaman login -->
        <p class="login-text">
            Already have an account?
            <a href="{% url 'login' %}">
                Login Here
            </a>
        </p>

    </div>

</body>
</html>
